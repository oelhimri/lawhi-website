<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lawhi — Quran Memorization App</title>
  <style>
    :root {
      --bg: #1c1a17;
      --text: #e8e4dc;
      --muted: #a39e94;
      --accent: #c8a96a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 600px; }
    h1 {
      font-size: 3.5rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
    }
    .tagline {
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }
    .divider {
      width: 60px;
      height: 1px;
      background: var(--muted);
      margin: 2rem auto;
    }
    .description {
      font-size: 1.15rem;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 2.5rem;
    }
    .stores {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 3rem;
    }
    .store-btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.95rem;
      transition: background 0.2s, color 0.2s;
    }
    .store-btn:hover {
      background: var(--accent);
      color: var(--bg);
    }
    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
    }
    footer a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      margin: 0 0.75rem;
    }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="container">
    <h1>LAWHI</h1>
    <p class="tagline">Coming Soon</p>
    <div class="divider"></div>
    <p class="description">
      Lawhi is a Quran memorization app inspired by how people learned for centuries — by writing.
    </p>
    <div class="stores">
      <a class="store-btn" href="#">Download on the App Store</a>
      <a class="store-btn" href="#">Get it on Google Play</a>
    </div>
  </div>
  <footer>
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
    <a href="mailto:contact@lawhapp.com">Contact</a>
  </footer>
</body>
</html>
